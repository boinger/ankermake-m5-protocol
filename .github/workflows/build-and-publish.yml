name: Release

on:
  push:
    tags:
      - v**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          version: latest
          install: true

      - name: Docker Metadata action
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ github.event_name == 'push' }}
          tags: ${{ github.ref_name }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  source-archives:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Create source release archives
        run: |
          mkdir -p release
          zip -r "release/ankerctl-${{ github.ref_name }}.zip" . -x '*.git*' 'release/*' 'dist/*'
          tar -czf "release/ankerctl-${{ github.ref_name }}.tar.gz" \
            --exclude-vcs \
            --exclude='./release' \
            --exclude='./dist' \
            .

      - name: Upload source release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-source
          path: release/ankerctl-${{ github.ref_name }}.*
          if-no-files-found: error

  native-bundles:
    name: Native Bundle (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-amd64
            archive_name: ankerctl-${{ github.ref_name }}-linux-amd64.tar.gz
          - runner: windows-latest
            target: windows-amd64
            archive_name: ankerctl-${{ github.ref_name }}-windows-amd64.zip
          - runner: macos-15-intel
            target: macos-amd64
            archive_name: ankerctl-${{ github.ref_name }}-macos-amd64.tar.gz
          - runner: macos-14
            target: macos-arm64
            archive_name: ankerctl-${{ github.ref_name }}-macos-arm64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install bundling dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller<7"

      - name: Build native bundle
        run: python -m PyInstaller --noconfirm --clean packaging/pyinstaller/ankerctl.spec

      - name: Smoke test Linux/macOS bundle
        if: runner.os != 'Windows'
        run: ./dist/ankerctl/ankerctl --help >/dev/null

      - name: Smoke test Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\ankerctl\ankerctl.exe --help | Out-Null

      - name: Create Linux/macOS archive
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          tar -C dist -czf "release/${{ matrix.archive_name }}" ankerctl

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path dist/ankerctl -DestinationPath "release/${{ matrix.archive_name }}"

      - name: Upload native bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: release/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - source-archives
      - native-bundles
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub release artifacts
        uses: docker://antonyurchenko/git-release:v5.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: release/ankerctl*
