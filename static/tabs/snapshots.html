<div class="tab-pane fade" id="snapshots" role="tabpanel" aria-labelledby="snapshots-tab">
    <div class="container-xl mt-3 mb-4">
        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card" id="timelapse-snapshot-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-semibold" id="timelapse-snapshot-title">Snapshot Viewer</div>
                            <div class="text-muted small" id="timelapse-snapshot-subtitle">Select a saved snapshot to preview.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <a id="timelapse-snapshot-download" class="btn btn-sm btn-outline-secondary disabled" href="#" download>
                                {{ macro.bi_icon("download") }} Download
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger" id="timelapse-snapshot-delete" disabled>
                                {{ macro.bi_icon("trash") }} Delete
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-2">
                        <div id="timelapse-snapshot-frame"
                             class="d-flex align-items-center justify-content-center text-muted rounded border bg-body-tertiary overflow-hidden"
                             style="min-height:320px;">
                            <div id="timelapse-snapshot-placeholder" class="text-center py-5">
                                <i class="bi bi-image fs-1 d-block mb-2"></i>
                                <span id="timelapse-snapshot-placeholder-text">Select a saved snapshot to preview</span>
                            </div>
                            <img id="timelapse-snapshot-image"
                                 class="img-fluid rounded"
                                 alt="Snapshot preview"
                                 style="display:none; max-height:520px; width:100%; object-fit:contain;">
                        </div>
                        <p class="text-muted small mt-2 mb-0" id="timelapse-snapshot-meta" style="display:none;"></p>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header fs-5">
                        {{ macro.bi_icon("images") }} Saved Snapshots
                    </div>
                    <div class="card-body">
                        <div class="vstack gap-3">
                            <div>
                                <label class="form-label small" for="timelapse-snapshot-collection">Collection</label>
                                <select class="form-select form-select-sm" id="timelapse-snapshot-collection">
                                    <option value="" selected>No snapshots available</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label small" for="timelapse-snapshot-select">Snapshot</label>
                                <select class="form-select form-select-sm" id="timelapse-snapshot-select" disabled>
                                    <option value="" selected>Select a capture first</option>
                                </select>
                            </div>
                            <div class="small text-muted" id="timelapse-snapshot-status">
                                Saved timelapse and manual snapshots will appear here.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
